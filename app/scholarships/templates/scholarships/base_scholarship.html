<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Scholarship Recommendation{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Roboto', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-white shadow-sm">
        <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <h1 class="text-lg font-bold text-gray-800">SCHOLARSHIP RECOMMENDATION SYSTEM</h1>
            <div class="flex items-center gap-4 text-sm">
                <a href="{% url 'scholarships:student_form' %}" class="text-blue-600 hover:underline">Apply</a>
                <a href="{% url 'scholarships:history' %}" class="text-blue-600 hover:underline">History</a>
                <span class="text-gray-500">{{ request.user.username }}</span>
                <a href="{% url 'logout' %}" class="text-red-500 hover:underline">Logout</a>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
